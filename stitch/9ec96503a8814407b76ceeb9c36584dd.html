<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vector Drift - Main Game</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&amp;family=Geist:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#ffb0cd",
                        "primary": "#4cd7f6",
                        "surface-variant": "#303638",
                        "primary-fixed": "#acedff",
                        "primary-fixed-dim": "#4cd7f6",
                        "surface-container-lowest": "#090f11",
                        "secondary-fixed": "#ffd9e4",
                        "surface-container-low": "#171d1e",
                        "on-secondary-container": "#ffbad3",
                        "on-primary": "#003640",
                        "outline-variant": "#3d494c",
                        "surface-container-highest": "#303638",
                        "surface-container-high": "#252b2d",
                        "on-surface-variant": "#bcc9cd",
                        "on-surface": "#dee3e6",
                        "inverse-primary": "#00687a",
                        "tertiary-fixed": "#ffdcbf",
                        "error-container": "#93000a",
                        "error": "#ffb4ab",
                        "tertiary-fixed-dim": "#ffb873",
                        "tertiary-container": "#e89337",
                        "outline": "#869397",
                        "on-secondary-fixed": "#3e0022",
                        "surface-container": "#1b2122",
                        "background": "#0e1416",
                        "surface": "#0e1416",
                        "surface-dim": "#0e1416",
                        "tertiary": "#ffb873",
                        "surface-bright": "#343a3c",
                        "on-secondary-fixed-variant": "#8c0053",
                        "on-background": "#dee3e6",
                        "surface-tint": "#4cd7f6",
                        "on-tertiary-fixed-variant": "#6a3b00",
                        "inverse-on-surface": "#2b3133",
                        "on-secondary": "#640039",
                        "secondary-fixed-dim": "#ffb0cd",
                        "on-tertiary-container": "#5b3200",
                        "on-error": "#690005",
                        "on-tertiary": "#4b2800",
                        "primary-container": "#06b6d4",
                        "secondary-container": "#aa0266",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-fixed": "#2d1600",
                        "on-primary-fixed": "#001f26",
                        "inverse-surface": "#dee3e6",
                        "on-primary-container": "#00424f",
                        "on-primary-fixed-variant": "#004e5c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "grid-size": "8px",
                        "touch-target-min": "44px",
                        "margin": "24px",
                        "unit": "4px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Space Grotesk"],
                        "label-sm": ["Geist"],
                        "body-md": ["Geist"],
                        "label-xs": ["Geist"],
                        "headline-lg": ["Space Grotesk"],
                        "display-lg": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-xs": ["10px", { "lineHeight": "12px", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "52px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        body { background-color: #0F172A; } /* Fallback background for visual consistency out of tailwind scope */
        
        /* Cyber-grid background */
        .cyber-grid {
            background-size: 32px 32px;
            background-image: 
                linear-gradient(to right, rgba(76, 215, 246, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(76, 215, 246, 0.05) 1px, transparent 1px);
        }

        /* Scanlines */
        .scanlines {
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
        }

        /* Triangle Ship CSS Shape */
        .player-ship {
            width: 0;
            height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-bottom: 24px solid #4cd7f6; /* Cyan */
            filter: drop-shadow(0 0 8px #4cd7f6);
        }

        /* Obstacle Glow */
        .obstacle {
            box-shadow: 0 0 8px #ffb0cd;
        }

        /* Scanline Overlay over everything to mimic screen */
        .crt-overlay {
            pointer-events: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 100;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            opacity: 0.5;
        }
    </style>
</head>
<body class="bg-background text-on-background h-screen w-screen overflow-hidden font-body-md relative flex flex-col items-center">
<div class="crt-overlay"></div>
<!-- Main Game Container -->
<div class="relative w-full max-w-5xl h-full mx-auto cyber-grid flex flex-col shadow-[0_0_40px_rgba(76,215,246,0.1)_inset]">
<!-- TopAppBar (from JSON) -->
<header class="bg-background/90 backdrop-blur-sm font-headline-lg text-headline-lg tracking-tighter docked full-width top-0 z-50 border-b border-primary/30 shadow-[0_4px_20px_rgba(76,215,246,0.15)] flex justify-between items-center px-margin py-4 w-full">
<!-- Brand / HUD Left -->
<div class="flex items-center gap-6">
<!-- Brand Logo (Vector Drift) hidden on mobile, HUD visible -->
<h1 class="hidden md:block font-display-lg text-display-lg font-bold italic text-primary drop-shadow-[0_0_8px_#4cd7f6] uppercase tracking-tighter">
                    VECTOR DRIFT
                </h1>
<!-- HUD: Score & Time -->
<div class="flex flex-col gap-1">
<div class="flex items-center gap-2">
<span class="font-label-sm text-label-sm uppercase text-on-surface-variant">Score</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary drop-shadow-[0_0_4px_#4cd7f6]">012,450</span>
</div>
<div class="flex items-center gap-2">
<span class="font-label-sm text-label-sm uppercase text-on-surface-variant">Time</span>
<span class="font-body-md text-body-md text-on-background">02:45.3</span>
</div>
</div>
</div>
<!-- HUD Right & Actions -->
<div class="flex items-center gap-8">
<!-- High Score Indicator -->
<div class="hidden md:flex flex-col items-end gap-1">
<span class="font-label-sm text-label-sm uppercase text-secondary">High Score</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface drop-shadow-[0_0_2px_#ffb0cd]">999,999</span>
</div>
<!-- Trailing Icon Actions -->
<div class="flex items-center gap-4">
<button aria-label="Settings" class="text-on-surface-variant hover:text-secondary hover:drop-shadow-[0_0_10px_#ffb0cd] transition-all active:scale-95 duration-100 flex items-center justify-center w-touch-target-min h-touch-target-min">
<span class="material-symbols-outlined text-[24px]">settings</span>
</button>
<button aria-label="Help" class="text-on-surface-variant hover:text-secondary hover:drop-shadow-[0_0_10px_#ffb0cd] transition-all active:scale-95 duration-100 flex items-center justify-center w-touch-target-min h-touch-target-min">
<span class="material-symbols-outlined text-[24px]">help</span>
</button>
<button aria-label="Pause" class="text-on-surface-variant hover:text-secondary hover:drop-shadow-[0_0_10px_#ffb0cd] transition-all active:scale-95 duration-100 flex items-center justify-center w-touch-target-min h-touch-target-min">
<span class="material-symbols-outlined text-[24px]">pause</span>
</button>
</div>
</div>
</header>
<!-- Playfield Area -->
<main class="flex-grow relative w-full h-full overflow-hidden border-x border-outline-variant/30">
<!-- Dynamic Obstacles (Simulated) -->
<!-- Obstacle 1 -->
<div class="absolute top-[20%] left-[30%] w-16 h-8 bg-secondary/20 border border-secondary obstacle transform rotate-12"></div>
<!-- Obstacle 2 -->
<div class="absolute top-[45%] left-[65%] w-24 h-6 bg-secondary/20 border border-secondary obstacle transform -rotate-6"></div>
<!-- Obstacle 3 -->
<div class="absolute top-[70%] left-[15%] w-12 h-12 bg-secondary/20 border border-secondary obstacle transform rotate-45"></div>
<!-- Player Ship -->
<div class="absolute bottom-[10%] left-1/2 transform -translate-x-1/2 player-ship"></div>
<!-- Visual Feedback / HUD Elements within playfield -->
<div class="absolute bottom-margin right-margin flex flex-col gap-2 opacity-50">
<div class="font-label-xs text-label-xs text-on-surface-variant uppercase tracking-widest text-right">Thruster Temp</div>
<div class="flex gap-1 h-2 w-32">
<div class="bg-primary flex-1"></div>
<div class="bg-primary flex-1"></div>
<div class="bg-primary flex-1"></div>
<div class="bg-primary/30 flex-1"></div>
<div class="bg-primary/30 flex-1"></div>
</div>
</div>
<div class="absolute bottom-margin left-margin flex flex-col gap-2 opacity-50">
<div class="font-label-xs text-label-xs text-on-surface-variant uppercase tracking-widest">Energy Core</div>
<div class="flex gap-1 h-2 w-32">
<div class="bg-secondary flex-1"></div>
<div class="bg-secondary flex-1"></div>
<div class="bg-secondary/30 flex-1"></div>
<div class="bg-secondary/30 flex-1"></div>
<div class="bg-secondary/30 flex-1"></div>
</div>
</div>
</main>
</div>
</body></html>
