<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Game Over - Vector Drift</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&amp;family=Geist:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary": "#ffb0cd",
                    "primary": "#4cd7f6",
                    "surface-variant": "#303638",
                    "primary-fixed": "#acedff",
                    "primary-fixed-dim": "#4cd7f6",
                    "surface-container-lowest": "#090f11",
                    "secondary-fixed": "#ffd9e4",
                    "surface-container-low": "#171d1e",
                    "on-secondary-container": "#ffbad3",
                    "on-primary": "#003640",
                    "outline-variant": "#3d494c",
                    "surface-container-highest": "#303638",
                    "surface-container-high": "#252b2d",
                    "on-surface-variant": "#bcc9cd",
                    "on-surface": "#dee3e6",
                    "inverse-primary": "#00687a",
                    "tertiary-fixed": "#ffdcbf",
                    "error-container": "#93000a",
                    "error": "#ffb4ab",
                    "tertiary-fixed-dim": "#ffb873",
                    "tertiary-container": "#e89337",
                    "outline": "#869397",
                    "on-secondary-fixed": "#3e0022",
                    "surface-container": "#1b2122",
                    "background": "#0e1416",
                    "surface": "#0e1416",
                    "surface-dim": "#0e1416",
                    "tertiary": "#ffb873",
                    "surface-bright": "#343a3c",
                    "on-secondary-fixed-variant": "#8c0053",
                    "on-background": "#dee3e6",
                    "surface-tint": "#4cd7f6",
                    "on-tertiary-fixed-variant": "#6a3b00",
                    "inverse-on-surface": "#2b3133",
                    "on-secondary": "#640039",
                    "secondary-fixed-dim": "#ffb0cd",
                    "on-tertiary-container": "#5b3200",
                    "on-error": "#690005",
                    "on-tertiary": "#4b2800",
                    "primary-container": "#06b6d4",
                    "secondary-container": "#aa0266",
                    "on-error-container": "#ffdad6",
                    "on-tertiary-fixed": "#2d1600",
                    "on-primary-fixed": "#001f26",
                    "inverse-surface": "#dee3e6",
                    "on-primary-container": "#00424f",
                    "on-primary-fixed-variant": "#004e5c"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "grid-size": "8px",
                    "touch-target-min": "44px",
                    "margin": "24px",
                    "unit": "4px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "headline-lg-mobile": [
                            "Space Grotesk"
                    ],
                    "label-sm": [
                            "Geist"
                    ],
                    "body-md": [
                            "Geist"
                    ],
                    "label-xs": [
                            "Geist"
                    ],
                    "headline-lg": [
                            "Space Grotesk"
                    ],
                    "display-lg": [
                            "Space Grotesk"
                    ]
            },
            "fontSize": {
                    "headline-lg-mobile": [
                            "24px",
                            {
                                    "lineHeight": "32px",
                                    "fontWeight": "600"
                            }
                    ],
                    "label-sm": [
                            "12px",
                            {
                                    "lineHeight": "16px",
                                    "letterSpacing": "0.05em",
                                    "fontWeight": "600"
                            }
                    ],
                    "body-md": [
                            "16px",
                            {
                                    "lineHeight": "24px",
                                    "fontWeight": "400"
                            }
                    ],
                    "label-xs": [
                            "10px",
                            {
                                    "lineHeight": "12px",
                                    "letterSpacing": "0.1em",
                                    "fontWeight": "700"
                            }
                    ],
                    "headline-lg": [
                            "32px",
                            {
                                    "lineHeight": "40px",
                                    "letterSpacing": "0.02em",
                                    "fontWeight": "600"
                            }
                    ],
                    "display-lg": [
                            "48px",
                            {
                                    "lineHeight": "52px",
                                    "letterSpacing": "-0.02em",
                                    "fontWeight": "700"
                            }
                    ]
            }
        },
        },
      }
    </script>
<style>
        .cyber-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(76, 215, 246, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(76, 215, 246, 0.05) 1px, transparent 1px);
        }
        .scanlines {
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.2) 51%);
            background-size: 100% 4px;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen relative overflow-hidden flex flex-col justify-center items-center">
<!-- Background Grid & Scanlines -->
<div class="absolute inset-0 cyber-grid pointer-events-none z-0"></div>
<div class="absolute inset-0 scanlines pointer-events-none z-0 opacity-50"></div>
<!-- Top Nav App Bar (Suppressed due to end-game state, focusing on content) -->
<main class="relative z-10 w-full max-w-2xl px-margin flex flex-col items-center">
<!-- Header -->
<div class="text-center mb-12">
<h1 class="font-display-lg text-display-lg md:font-display-lg md:text-display-lg text-secondary drop-shadow-[0_0_12px_#ffb0cd] italic mb-4">GAME OVER</h1>
</div>
<!-- New High Score Badge -->
<div class="mb-6 flex justify-center">
<div class="bg-[#0e1416] border border-primary text-primary px-4 py-2 font-label-sm text-label-sm uppercase shadow-[0_0_8px_#4cd7f6] flex items-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
                NEW HIGH SCORE
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
<!-- Results Panel -->
<div class="w-full bg-[#111827] border border-outline-variant p-8 relative mb-8 group">
<!-- Glow Effect on focus/hover simulator -->
<div class="absolute inset-0 border border-primary opacity-20 pointer-events-none shadow-[0_0_15px_#4cd7f6] transition-opacity"></div>
<div class="flex flex-col items-center gap-6 relative z-10">
<!-- Final Score -->
<div class="text-center border-b border-outline-variant w-full pb-6">
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-2">Final Score</p>
<p class="font-headline-lg text-headline-lg md:font-display-lg md:text-display-lg text-primary drop-shadow-[0_0_8px_#4cd7f6]">1250</p>
</div>
<!-- Detailed Stats Grid -->
<div class="grid grid-cols-2 gap-4 w-full text-center">
<div class="p-4 border border-outline-variant bg-[#0e1416]">
<p class="font-label-xs text-label-xs text-on-surface-variant uppercase mb-1">Time Survived</p>
<p class="font-body-md text-body-md text-on-surface font-mono">01:45</p>
</div>
<div class="p-4 border border-outline-variant bg-[#0e1416]">
<p class="font-label-xs text-label-xs text-on-surface-variant uppercase mb-1">Multiplier</p>
<p class="font-body-md text-body-md text-secondary font-mono drop-shadow-[0_0_4px_#ffb0cd]">x4.2</p>
</div>
</div>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col sm:flex-row gap-4 w-full max-w-md justify-center mb-8">
<button class="flex-1 bg-primary border border-primary text-on-primary font-label-sm text-label-sm uppercase h-[44px] px-6 hover:shadow-[0_0_12px_#4cd7f6] transition-shadow flex items-center justify-center gap-2">
<span class="material-symbols-outlined">replay</span>
                PLAY AGAIN
            </button>
<button class="flex-1 bg-transparent border border-primary text-primary font-label-sm text-label-sm uppercase h-[44px] px-6 hover:shadow-[0_0_12px_#4cd7f6] transition-shadow flex items-center justify-center gap-2">
<span class="material-symbols-outlined">home</span>
                MAIN MENU
            </button>
</div>
<!-- Share -->
<div class="flex gap-4 items-center">
<button class="w-[44px] h-[44px] border border-outline-variant text-on-surface-variant hover:border-primary hover:text-primary transition-colors flex items-center justify-center">
<span class="material-symbols-outlined">share</span>
</button>
<button class="w-[44px] h-[44px] border border-outline-variant text-on-surface-variant hover:border-primary hover:text-primary transition-colors flex items-center justify-center">
<span class="material-symbols-outlined">download</span>
</button>
</div>
</main>
</body></html>
