<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vector Drift - Options</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&amp;family=Geist:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary": "#ffb0cd",
                        "primary": "#4cd7f6",
                        "surface-variant": "#303638",
                        "primary-fixed": "#acedff",
                        "primary-fixed-dim": "#4cd7f6",
                        "surface-container-lowest": "#090f11",
                        "secondary-fixed": "#ffd9e4",
                        "surface-container-low": "#171d1e",
                        "on-secondary-container": "#ffbad3",
                        "on-primary": "#003640",
                        "outline-variant": "#3d494c",
                        "surface-container-highest": "#303638",
                        "surface-container-high": "#252b2d",
                        "on-surface-variant": "#bcc9cd",
                        "on-surface": "#dee3e6",
                        "inverse-primary": "#00687a",
                        "tertiary-fixed": "#ffdcbf",
                        "error-container": "#93000a",
                        "error": "#ffb4ab",
                        "tertiary-fixed-dim": "#ffb873",
                        "tertiary-container": "#e89337",
                        "outline": "#869397",
                        "on-secondary-fixed": "#3e0022",
                        "surface-container": "#1b2122",
                        "background": "#0e1416",
                        "surface": "#0e1416",
                        "surface-dim": "#0e1416",
                        "tertiary": "#ffb873",
                        "surface-bright": "#343a3c",
                        "on-secondary-fixed-variant": "#8c0053",
                        "on-background": "#dee3e6",
                        "surface-tint": "#4cd7f6",
                        "on-tertiary-fixed-variant": "#6a3b00",
                        "inverse-on-surface": "#2b3133",
                        "on-secondary": "#640039",
                        "secondary-fixed-dim": "#ffb0cd",
                        "on-tertiary-container": "#5b3200",
                        "on-error": "#690005",
                        "on-tertiary": "#4b2800",
                        "primary-container": "#06b6d4",
                        "secondary-container": "#aa0266",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-fixed": "#2d1600",
                        "on-primary-fixed": "#001f26",
                        "inverse-surface": "#dee3e6",
                        "on-primary-container": "#00424f",
                        "on-primary-fixed-variant": "#004e5c"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "grid-size": "8px",
                        "touch-target-min": "44px",
                        "margin": "24px",
                        "unit": "4px",
                        "gutter": "16px"
                    },
                    fontFamily: {
                        "headline-lg-mobile": ["Space Grotesk"],
                        "label-sm": ["Geist"],
                        "body-md": ["Geist"],
                        "label-xs": ["Geist"],
                        "headline-lg": ["Space Grotesk"],
                        "display-lg": ["Space Grotesk"]
                    },
                    fontSize: {
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-xs": ["10px", { "lineHeight": "12px", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "52px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .neon-glow-primary {
            box-shadow: 0 0 8px #4cd7f6, inset 0 0 4px #4cd7f6;
        }
        .neon-glow-secondary {
            box-shadow: 0 0 8px #ffb0cd, inset 0 0 4px #ffb0cd;
        }
        .scanlines {
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen relative overflow-x-hidden selection:bg-primary selection:text-on-primary">
<!-- Scanline Overlay -->
<div class="fixed inset-0 pointer-events-none scanlines z-50 mix-blend-overlay opacity-30"></div>
<div class="max-w-3xl mx-auto min-h-screen flex flex-col px-margin py-margin relative z-10">
<!-- Header -->
<header class="flex items-center gap-4 mb-12 border-b border-primary/30 pb-4 relative">
<button class="w-touch-target-min h-touch-target-min flex items-center justify-center border border-outline-variant hover:border-primary hover:neon-glow-primary hover:text-primary transition-all text-on-surface-variant group">
<span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary tracking-tighter drop-shadow-[0_0_8px_#4cd7f6]">
                OPTIONS
            </h1>
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col gap-8">
<!-- AUDIO CONFIGURATION -->
<section class="bg-surface-container border border-outline-variant p-margin relative">
<div class="absolute -top-[1px] left-0 w-1/3 border-t-2 border-secondary neon-glow-secondary shadow-[0_0_4px_#ffb0cd]"></div>
<h2 class="font-label-sm text-label-sm text-secondary uppercase tracking-widest mb-6 flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">volume_up</span>
                    AUDIO CONFIGURATION
                </h2>
<div class="flex flex-col gap-4">
<!-- Background Music Toggle -->
<div class="flex items-center justify-between p-unit bg-surface-container-high border border-outline-variant hover:border-primary/50 transition-colors">
<span class="font-body-md text-body-md text-on-surface ml-2">Background Music</span>
<button class="w-12 h-6 border border-primary bg-primary/20 relative flex items-center p-[2px]">
<div class="w-5 h-full bg-primary neon-glow-primary ml-auto shadow-[0_0_4px_#4cd7f6]"></div>
</button>
</div>
<!-- Sound Effects Toggle -->
<div class="flex items-center justify-between p-unit bg-surface-container-high border border-outline-variant hover:border-primary/50 transition-colors">
<span class="font-body-md text-body-md text-on-surface ml-2">Sound Effects</span>
<button class="w-12 h-6 border border-primary bg-primary/20 relative flex items-center p-[2px]">
<div class="w-5 h-full bg-primary neon-glow-primary ml-auto shadow-[0_0_4px_#4cd7f6]"></div>
</button>
</div>
</div>
</section>
<!-- GAMEPLAY PARAMETERS -->
<section class="bg-surface-container border border-outline-variant p-margin relative">
<div class="absolute -top-[1px] left-0 w-1/3 border-t-2 border-primary neon-glow-primary shadow-[0_0_4px_#4cd7f6]"></div>
<h2 class="font-label-sm text-label-sm text-primary uppercase tracking-widest mb-6 flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">sports_esports</span>
                    GAMEPLAY PARAMETERS
                </h2>
<div class="flex flex-col gap-8">
<!-- AI Difficulty -->
<div class="flex flex-col gap-3">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase">AI Difficulty</label>
<div class="grid grid-cols-3 gap-[1px] bg-outline-variant border border-outline-variant">
<button class="bg-surface-container-high py-2 font-label-sm text-label-sm text-on-surface-variant hover:bg-surface-container-highest transition-colors">EASY</button>
<button class="bg-primary/20 py-2 font-label-sm text-label-sm text-primary border border-primary neon-glow-primary shadow-[0_0_8px_rgba(76,215,246,0.3)]">NORMAL</button>
<button class="bg-surface-container-high py-2 font-label-sm text-label-sm text-on-surface-variant hover:bg-surface-container-highest transition-colors">HARD</button>
</div>
</div>
<!-- Simulation Speed -->
<div class="flex flex-col gap-3">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase">Simulation Speed</label>
<span class="font-label-xs text-label-xs text-primary">1.0x</span>
</div>
<div class="h-8 flex items-center relative w-full">
<div class="absolute w-full h-[2px] bg-outline-variant top-1/2 -translate-y-1/2"></div>
<div class="absolute w-1/2 h-[2px] bg-primary top-1/2 -translate-y-1/2 shadow-[0_0_4px_#4cd7f6]"></div>
<div class="absolute left-1/2 w-4 h-6 bg-primary border border-background -translate-x-1/2 cursor-pointer hover:neon-glow-primary shadow-[0_0_4px_#4cd7f6]"></div>
</div>
</div>
<!-- Steering Sensitivity -->
<div class="flex flex-col gap-3">
<div class="flex justify-between items-center">
<label class="font-label-sm text-label-sm text-on-surface-variant uppercase">Steering Sensitivity</label>
<span class="font-label-xs text-label-xs text-secondary">HIGH</span>
</div>
<div class="flex gap-1 h-6">
<div class="flex-1 bg-secondary border border-secondary neon-glow-secondary opacity-20"></div>
<div class="flex-1 bg-secondary border border-secondary neon-glow-secondary opacity-40"></div>
<div class="flex-1 bg-secondary border border-secondary neon-glow-secondary opacity-60"></div>
<div class="flex-1 bg-secondary border border-secondary neon-glow-secondary shadow-[0_0_8px_#ffb0cd]"></div>
<div class="flex-1 bg-surface-container-highest border border-outline-variant"></div>
</div>
</div>
</div>
</section>
</main>
<!-- Footer -->
<footer class="mt-12">
<button class="w-full h-14 bg-surface border border-outline-variant hover:border-primary text-on-surface hover:text-primary font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg tracking-tighter uppercase transition-all flex items-center justify-center gap-4 group hover:neon-glow-primary shadow-[0_4px_20px_rgba(76,215,246,0.05)] hover:shadow-[0_4px_20px_rgba(76,215,246,0.15)] active:scale-[0.98]">
<span class="material-symbols-outlined opacity-0 group-hover:opacity-100 transition-opacity">chevron_left</span>
                MAIN MENU
                <span class="material-symbols-outlined opacity-0 group-hover:opacity-100 transition-opacity">chevron_right</span>
</button>
</footer>
</div>
</body></html>
