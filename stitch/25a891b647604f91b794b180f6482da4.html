<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vector Drift - Main Menu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;600;700&amp;family=Space+Grotesk:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary": "#ffb0cd",
                        "primary": "#4cd7f6",
                        "surface-variant": "#303638",
                        "primary-fixed": "#acedff",
                        "primary-fixed-dim": "#4cd7f6",
                        "surface-container-lowest": "#090f11",
                        "secondary-fixed": "#ffd9e4",
                        "surface-container-low": "#171d1e",
                        "on-secondary-container": "#ffbad3",
                        "on-primary": "#003640",
                        "outline-variant": "#3d494c",
                        "surface-container-highest": "#303638",
                        "surface-container-high": "#252b2d",
                        "on-surface-variant": "#bcc9cd",
                        "on-surface": "#dee3e6",
                        "inverse-primary": "#00687a",
                        "tertiary-fixed": "#ffdcbf",
                        "error-container": "#93000a",
                        "error": "#ffb4ab",
                        "tertiary-fixed-dim": "#ffb873",
                        "tertiary-container": "#e89337",
                        "outline": "#869397",
                        "on-secondary-fixed": "#3e0022",
                        "surface-container": "#1b2122",
                        "background": "#0e1416",
                        "surface": "#0e1416",
                        "surface-dim": "#0e1416",
                        "tertiary": "#ffb873",
                        "surface-bright": "#343a3c",
                        "on-secondary-fixed-variant": "#8c0053",
                        "on-background": "#dee3e6",
                        "surface-tint": "#4cd7f6",
                        "on-tertiary-fixed-variant": "#6a3b00",
                        "inverse-on-surface": "#2b3133",
                        "on-secondary": "#640039",
                        "secondary-fixed-dim": "#ffb0cd",
                        "on-tertiary-container": "#5b3200",
                        "on-error": "#690005",
                        "on-tertiary": "#4b2800",
                        "primary-container": "#06b6d4",
                        "secondary-container": "#aa0266",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-fixed": "#2d1600",
                        "on-primary-fixed": "#001f26",
                        "inverse-surface": "#dee3e6",
                        "on-primary-container": "#00424f",
                        "on-primary-fixed-variant": "#004e5c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "grid-size": "8px",
                        "touch-target-min": "44px",
                        "margin": "24px",
                        "unit": "4px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Space Grotesk"],
                        "label-sm": ["Geist"],
                        "body-md": ["Geist"],
                        "label-xs": ["Geist"],
                        "headline-lg": ["Space Grotesk"],
                        "display-lg": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-xs": ["10px", { "lineHeight": "12px", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "0.02em", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "52px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .cyber-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(76, 215, 246, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(76, 215, 246, 0.05) 1px, transparent 1px);
        }
        .scanlines {
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
            background-size: 100% 4px;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col relative overflow-hidden font-body-md">
<!-- Background Effects -->
<div class="absolute inset-0 cyber-grid z-0 pointer-events-none"></div>
<div class="absolute inset-0 scanlines z-0 pointer-events-none opacity-50"></div>
<div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,rgba(76,215,246,0.15)_0%,rgba(14,20,22,1)_70%)] z-0 pointer-events-none"></div>
<!-- Top App Bar (Suppressed for immersive Main Menu per JSON guidelines, but adding header for structure if needed. Leaving out full nav cluster) -->
<header class="w-full flex justify-between items-center px-margin py-4 z-50 relative pointer-events-none hidden md:flex">
<div class="font-headline-lg text-headline-lg tracking-tighter text-primary font-bold italic drop-shadow-[0_0_8px_#4cd7f6] hidden">VECTOR DRIFT</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center relative z-10 px-margin w-full max-w-md mx-auto gap-8">
<!-- Brand Title -->
<div class="text-center mb-8">
<h1 class="font-display-lg text-display-lg md:text-[72px] md:leading-[80px] font-bold italic text-primary drop-shadow-[0_0_12px_#4cd7f6] tracking-tighter uppercase">
                VECTOR DRIFT
            </h1>
</div>
<!-- Menu Buttons Stack -->
<div class="flex flex-col w-full gap-4">
<!-- START GAME: Primary Fill -->
<button class="w-full min-h-touch-target-min flex items-center justify-center bg-primary text-on-primary border border-primary font-label-sm text-label-sm uppercase tracking-widest px-6 py-4 hover:drop-shadow-[0_0_10px_#4cd7f6] transition-all duration-100 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background">
                START GAME
            </button>
<!-- RESUME: Outline -->
<button class="w-full min-h-touch-target-min flex items-center justify-center bg-transparent text-primary border border-primary font-label-sm text-label-sm uppercase tracking-widest px-6 py-4 hover:drop-shadow-[0_0_10px_#4cd7f6] transition-all duration-100 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background">
                RESUME
            </button>
<!-- OPTIONS: Outline with Icon -->
<button class="w-full min-h-touch-target-min flex items-center justify-center gap-3 bg-transparent text-primary border border-primary font-label-sm text-label-sm uppercase tracking-widest px-6 py-4 hover:drop-shadow-[0_0_10px_#4cd7f6] transition-all duration-100 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">settings</span>
                OPTIONS
            </button>
<!-- HELP: Outline with Icon -->
<button class="w-full min-h-touch-target-min flex items-center justify-center gap-3 bg-transparent text-primary border border-primary font-label-sm text-label-sm uppercase tracking-widest px-6 py-4 hover:drop-shadow-[0_0_10px_#4cd7f6] transition-all duration-100 active:scale-95 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">help</span>
                HELP
            </button>
</div>
</main>
<!-- Footer High Score Badge -->
<footer class="w-full flex justify-center pb-margin pt-8 relative z-10">
<div class="bg-surface-container-highest border border-outline-variant px-4 py-2 flex items-center gap-2 drop-shadow-[0_0_4px_#4cd7f6]">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">stars</span>
<span class="font-label-xs text-label-xs text-primary uppercase tracking-widest">HIGH SCORE: 5000</span>
</div>
</footer>
</body></html>
